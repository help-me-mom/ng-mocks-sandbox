services:
  core:
    image: satantime/puppeteer-node:24.14.0
    platform: linux/amd64
    working_dir: /app
    volumes:
      - .:/app
      - cache:/root/.cache
      - gyp:/root/.node-gyp
      - npm:/root/.npm
    command:
      - npm
      - install
      - --no-audit

volumes:
  cache:
  npm:
  gyp:
